  messagingSenderId: "222911556574",
  appId: "1:222911556574:web:76f3f1301a601b18848b4f"
};

const ROOM_ID = "control-room";

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const stateRef = db.ref(`rooms/${ROOM_ID}/state`);
const connRef  = db.ref(".info/connected");

let lastWriteId = null;

/* Connection indicator */
connRef.on("value", snap=>{
  const el=document.getElementById("syncStatus");
  if(!el) return;
  el.textContent = snap.val() ? "🟢 Connected" : "🔴 Offline";
  el.style.background = snap.val()
    ? "rgba(34,197,94,.2)"
    : "rgba(239,68,68,.2)";
});

/* ============================================================
   ✅ STATE (Firebase is source of truth)
============================================================ */
const DEFAULTS = {
  settings:{ defaultInterval:30, dueSoonMin:5, sound:true, metricsAutoCloseSec:15 },
  sites:[],
  logs:[]
};

let state = structuredClone(DEFAULTS);

/* 🔁 Realtime listener */
stateRef.on("value", snap=>{
  const remote = snap.val();

  if(!remote){
    saveState("seed");
    return;
  }

  if(remote._meta?.writeId === lastWriteId) return;

  const clean = structuredClone(remote);
  delete clean._meta;
  state = clean;
  render();
});

/* ✅ saveState now writes to Firebase */
function saveState(reason="update"){
  const payload = {
    ...state,
    _meta:{ writeId:crypto.randomUUID(), ts:Date.now(), reason }
  };
  lastWriteId = payload._meta.writeId;
  stateRef.set(payload);
}

/* ============================================================
   🚫 DISABLED GIST SYNC (Firebase only)
============================================================ */

/* Kickoff */
render();
setInterval(()=>document.getElementById("clock").textContent=new Date().toLocaleString(),1000);
</script>
